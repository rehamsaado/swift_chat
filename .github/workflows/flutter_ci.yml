name: Flutter CI

# تحديد متى يعمل الـ CI (عند الدمج أو الرفع على فرع main)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب كود المشروع من غيت هاب
      - uses: actions/checkout@v3

      # 2. إعداد بيئة جافا (مهمة للـ Android لاحقاً)
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة فلاتر وتثبيتها
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # أو حدد إصدارك الحالي بدقة مثل 3.22.x
          channel: 'stable'

      # 4. تحميل حزم الاعتماديات (Packages)
      - name: Install dependencies
        run: flutter pub get

      # 5. تشغيل الـ Build Runner باستخدام dart run
      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      # 6. تحليل الكود للتأكد من عدم وجود أخطاء صياغة (Linter)
      - name: Analyze code
        run: flutter analyze

