name: Flutter CI/CD

# الـ Trigger: سيعمل الـ CI عند أي Push، بينما يعمل الـ CD فقط عند إنشاء "Tag" للنسخة (مثال: v1.0.0)
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  # 1. وظيفة الـ CI (فحص الكود)
  analyze:
    name: Analyze and Test Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze

  # 2. وظيفة الـ CD (بناء وتوزيع التطبيق)
  build-and-release:
    name: Build APK and Push to Release
    needs: analyze # لن تبدأ هذه الخطوة إلا إذا نجحت خطوة الـ CI بالكامل
    if: startsWith(github.ref, 'refs/tags/') # ستعمل فقط عندما نقوم بإنشاء Tag جديد للنسخة
    runs-on: ubuntu-latest
    permissions:
      contents: write # لإعطاء غيت هاب الصلاحية لرفع الملف في صفحة الـ Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}